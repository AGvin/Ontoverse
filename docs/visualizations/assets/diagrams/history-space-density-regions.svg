  <text x="210" y="420" fill="#b89dff" font-size="26" text-anchor="end" font-family="Inter, Segoe UI, Arial, sans-serif">Medium temporal</text><text x="210" y="452" fill="#b89dff" font-size="26" text-anchor="end" font-family="Inter, Segoe UI, Arial, sans-serif">density region</text>
  <text x="210" y="635" fill="#ffb64d" font-size="26" text-anchor="end" font-family="Inter, Segoe UI, Arial, sans-serif">High temporal</text><text x="210" y="667" fill="#ffb64d" font-size="26" text-anchor="end" font-family="Inter, Segoe UI, Arial, sans-serif">density region</text>
