<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">History-Space Density Regions</title>
  <desc id="desc">Sparse, medium, dense, and burst-like strings inside history-space. All event-nodes are placed directly on the realized strings.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="82%"><stop offset="0" stop-color="#07152a"/><stop offset="0.65" stop-color="#020713"/><stop offset="1" stop-color="#00030a"/></radialGradient>
    <linearGradient id="plane" x1="1240" y1="140" x2="1330" y2="760" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#ff6076" stop-opacity="0.06"/><stop offset="0.5" stop-color="#ff244b" stop-opacity="0.33"/><stop offset="1" stop-color="#ff6076" stop-opacity="0.08"/></linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="ruby" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="7" result="b"/><feColorMatrix in="b" type="matrix" values="1 0 0 0 1 0 0 0 0 .04 0 0 0 0 .12 0 0 0 .9 0" result="c"/><feMerge><feMergeNode in="c"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="800" y="78" fill="#f8fbff" font-family="Orbitron, Rajdhani, Segoe UI, Arial, sans-serif" font-size="48" text-anchor="middle">History-Space Density Regions</text>
  <text x="800" y="122" fill="#8ea6c8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" text-anchor="middle">different strings accumulate different event-node densities before the same frontal boundary</text>
  <g opacity=".18" stroke="#1a63bd" fill="none"><path d="M190 170 H1330 V745 H190 Z"/><path d="M190 315 H1330"/><path d="M190 450 H1330"/><path d="M190 585 H1330"/><path d="M410 170 V745"/><path d="M650 170 V745"/><path d="M890 170 V745"/><path d="M1130 170 V745"/></g>
  <g filter="url(#ruby)"><polygon points="1240,190 1330,140 1330,780 1240,730" fill="url(#plane)" stroke="#ff4562" stroke-width="4"/><line x1="1330" y1="140" x2="1330" y2="780" stroke="#ff6b7d" stroke-width="5"/></g>
  <text x="1360" y="395" fill="#ff5d73" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25">frontal time plane</text>
  <text x="80" y="245" fill="#20e8ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24">Low density</text><text x="80" y="380" fill="#76b5ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24">Medium density</text><text x="80" y="515" fill="#b97cff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24">High density</text><text x="80" y="650" fill="#ff67d8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24">Burst density</text>
  <g fill="none" stroke-linecap="round" stroke-width="4" filter="url(#glow)">
    <path d="M240 245 C420 205 600 235 780 215 C960 195 1110 230 1240 220" stroke="#20e8ff"/>
    <path d="M240 380 C420 345 600 370 780 360 C960 350 1110 382 1240 375" stroke="#76b5ff"/>
    <path d="M240 515 C420 500 600 535 780 510 C960 485 1110 518 1240 510" stroke="#b97cff"/>
    <path d="M240 650 C420 640 600 682 780 645 C960 608 1110 650 1240 640" stroke="#ff67d8"/>
  </g>
  <g fill="none" stroke-linecap="round" stroke-dasharray="3 10" stroke-width="2.2" opacity=".78">
    <path d="M780 215 C835 165 895 165 950 205" stroke="#20e8ff"/><path d="M1060 226 C1115 175 1180 178 1230 220" stroke="#20e8ff"/>
    <path d="M600 370 C660 325 725 325 780 360" stroke="#76b5ff"/><path d="M960 350 C1020 310 1090 315 1150 374" stroke="#76b5ff"/>
    <path d="M460 505 C520 460 590 465 650 528" stroke="#b97cff"/><path d="M780 510 C850 455 930 460 1000 493" stroke="#b97cff"/><path d="M1060 515 C1120 465 1190 470 1235 510" stroke="#b97cff"/>
    <path d="M540 670 C600 610 675 615 740 652" stroke="#ff67d8"/><path d="M805 638 C870 585 950 592 1020 620" stroke="#ff67d8"/><path d="M1040 640 C1105 585 1180 592 1235 640" stroke="#ffbd56"/>
  </g>
  <g filter="url(#glow)" fill="#07152a" stroke-width="3.5">
    <circle cx="240" cy="245" r="8" stroke="#20e8ff"/><circle cx="600" cy="235" r="7" stroke="#20e8ff"/><circle cx="900" cy="202" r="7" stroke="#20e8ff"/><circle cx="1240" cy="220" r="8" stroke="#20e8ff"/>
    <circle cx="240" cy="380" r="8" stroke="#76b5ff"/><circle cx="420" cy="345" r="7" stroke="#76b5ff"/><circle cx="600" cy="370" r="7" stroke="#76b5ff"/><circle cx="780" cy="360" r="7" stroke="#76b5ff"/><circle cx="960" cy="350" r="7" stroke="#76b5ff"/><circle cx="1110" cy="382" r="7" stroke="#76b5ff"/><circle cx="1240" cy="375" r="8" stroke="#76b5ff"/>
    <circle cx="240" cy="515" r="8" stroke="#b97cff"/><circle cx="330" cy="507" r="7" stroke="#b97cff"/><circle cx="420" cy="500" r="7" stroke="#b97cff"/><circle cx="510" cy="516" r="7" stroke="#b97cff"/><circle cx="600" cy="535" r="7" stroke="#b97cff"/><circle cx="690" cy="523" r="7" stroke="#b97cff"/><circle cx="780" cy="510" r="7" stroke="#b97cff"/><circle cx="870" cy="497" r="7" stroke="#b97cff"/><circle cx="960" cy="485" r="7" stroke="#b97cff"/><circle cx="1050" cy="504" r="7" stroke="#b97cff"/><circle cx="1140" cy="516" r="7" stroke="#b97cff"/><circle cx="1240" cy="510" r="8" stroke="#b97cff"/>
    <circle cx="240" cy="650" r="8" stroke="#ff67d8"/><circle cx="420" cy="640" r="7" stroke="#ff67d8"/><circle cx="480" cy="654" r="7" stroke="#ff67d8"/><circle cx="520" cy="662" r="7" stroke="#ff67d8"/><circle cx="560" cy="670" r="7" stroke="#ff67d8"/><circle cx="600" cy="682" r="7" stroke="#ff67d8"/><circle cx="640" cy="676" r="7" stroke="#ff67d8"/><circle cx="680" cy="666" r="7" stroke="#ff67d8"/><circle cx="720" cy="655" r="7" stroke="#ff67d8"/><circle cx="780" cy="645" r="7" stroke="#ff67d8"/><circle cx="900" cy="620" r="7" stroke="#ff67d8"/><circle cx="1020" cy="622" r="7" stroke="#ff67d8"/><circle cx="1110" cy="650" r="7" stroke="#ffbd56"/><circle cx="1240" cy="640" r="8" stroke="#ffbd56"/>
  </g>
  <text x="480" y="820" fill="#8ea6c8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22">No decorative free-floating points: every node belongs to its string.</text>
</svg>