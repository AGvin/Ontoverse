<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">History-Space Density Regions</title>
  <desc id="desc">A history-space volume with sparse, medium, and dense temporal-density regions ending at the frontal time plane.</desc>
  <defs>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1600" height="900" fill="#05070d"/>
  <text x="720" y="64" fill="#cfe7ff" font-size="30" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif">History-space</text>
