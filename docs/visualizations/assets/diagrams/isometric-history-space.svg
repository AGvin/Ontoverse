<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Isometric History-Space</title>
  <desc id="desc">Detailed vector SVG inspired by the approved isometric composition: three volumetric tree-like history structures branch through history-space and terminate at a ruby frontal time plane.</desc>
  <defs>
    <radialGradient id="bg" cx="52%" cy="48%" r="88%"><stop offset="0" stop-color="#07162d"/><stop offset="0.68" stop-color="#020713"/><stop offset="1" stop-color="#00030a"/></radialGradient>
    <linearGradient id="plane" x1="1195" y1="55" x2="1420" y2="820" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#ff6b7d" stop-opacity="0.05"/><stop offset="0.5" stop-color="#ff234a" stop-opacity="0.34"/><stop offset="1" stop-color="#ff6b7d" stop-opacity="0.09"/></linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="ruby" x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur stdDeviation="5" result="b"/><feColorMatrix in="b" type="matrix" values="1 0 0 0 1 0 0 0 0 .04 0 0 0 0 .12 0 0 0 .9 0" result="c"/><feMerge><feMergeNode in="c"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
