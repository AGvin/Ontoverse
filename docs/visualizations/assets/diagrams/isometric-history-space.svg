    <line x1="1220" y1="170" x2="1220" y2="600" stroke="#ff6b7d" stroke-width="5"/>
    <line x1="1370" y1="255" x2="1370" y2="695" stroke="#ff6b7d" stroke-width="5"/>
  </g>
  <text x="1395" y="445" fill="#ff5d73" font-family="Segoe UI, Arial, sans-serif" font-size="28">frontal time plane</text>
  <text x="106" y="250" fill="#14eaff" font-family="Segoe UI, Arial, sans-serif" font-size="26">branching</text>
  <text x="106" y="282" fill="#14eaff" font-family="Segoe UI, Arial, sans-serif" font-size="26">history trees</text>
  <text x="710" y="810" fill="#aab6d8" font-family="Segoe UI, Arial, sans-serif" font-size="22" text-anchor="middle">Tree-like strings branch inside the volume; realized branches terminate at the ruby frontal time plane.</text>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="4" filter="url(#glow)">
