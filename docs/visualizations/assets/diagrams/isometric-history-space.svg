<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Isometric History-Space</title>
  <desc id="desc">Clean isometric SVG showing volumetric tree-like history branches, event-nodes, and a ruby frontal time plane.</desc>
