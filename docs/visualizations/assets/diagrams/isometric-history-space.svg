<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Isometric History-Space</title>
  <desc id="desc">Isometric SVG diagram of volumetric history-space with branching tree-like strings, event-nodes, and a ruby frontal time plane.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="85%"><stop offset="0" stop-color="#07152a"/><stop offset="0.65" stop-color="#020713"/><stop offset="1" stop-color="#00030a"/></radialGradient>
    <linearGradient id="plane" x1="1220" y1="170" x2="1360" y2="760" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#ff6076" stop-opacity="0.10"/><stop offset="0.5" stop-color="#ff244b" stop-opacity="0.38"/><stop offset="1" stop-color="#ff6076" stop-opacity="0.12"/></linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="ruby" x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur stdDeviation="6" result="b"/><feColorMatrix in="b" type="matrix" values="1 0 0 0 1 0 0 0 0 .04 0 0 0 0 .12 0 0 0 .9 0" result="c"/><feMerge><feMergeNode in="c"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="92" y="86" fill="#f8fbff" font-family="Segoe UI, Arial, sans-serif" font-size="52">Isometric History-Space</text>
  <text x="92" y="128" fill="#8ea6c8" font-family="Segoe UI, Arial, sans-serif" font-size="24">volumetric branching history trees approaching the frontal time plane</text>
  <g opacity="0.16" stroke="#1a63bd" fill="none">
