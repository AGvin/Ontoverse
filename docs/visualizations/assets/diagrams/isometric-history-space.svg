  <g opacity="0.78" stroke="#8ea6c8" fill="none"><path d="M225 275 L250 300"/><text x="150" y="270" fill="#8ea6c8" font-family="Segoe UI, Arial, sans-serif" font-size="20">root events</text><path d="M735 745 L760 705"/><text x="625" y="760" fill="#8ea6c8" font-family="Segoe UI, Arial, sans-serif" font-size="20">event-nodes</text></g>
</svg>