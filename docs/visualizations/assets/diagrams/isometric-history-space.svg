<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Isometric History-Space</title>
  <desc id="desc">Isometric SVG with root nodes placed on the intended internal node positions, distinct color families per tree, and terminal nodes distributed across the frontal time plane.</desc>
