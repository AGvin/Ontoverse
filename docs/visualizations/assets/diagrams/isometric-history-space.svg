    <path d="M250 220 L250 650 L390 740 L390 310"/>
    <path d="M1220 170 L1220 600 L1370 695 L1370 255"/>
    <path d="M250 650 L1220 600 L1370 695 L390 740 Z"/>
    <path d="M430 210 L565 292 M610 195 L745 278 M790 185 L925 268 M970 176 L1105 259 M1150 168 L1285 250"/>
    <path d="M390 310 L1370 255 M390 420 L1370 365 M390 530 L1370 475 M390 640 L1370 585"/>
    <path d="M250 330 L390 420 M250 440 L390 530 M250 550 L390 640"/>
  </g>
  <g filter="url(#ruby)">
