<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Uneven Temporal Density Across History-Space</title>
  <desc id="desc">Representative trajectories with sparse, sparse-to-dense, dense-to-sparse, burst cluster, and uniform medium event-node patterns. All trajectories terminate at the ruby frontal time plane.</desc>
  <defs>
    <radialGradient id="bg" cx="48%" cy="50%" r="82%"><stop offset="0" stop-color="#08152b"/><stop offset="0.6" stop-color="#020713"/><stop offset="1" stop-color="#00030a"/></radialGradient>
    <linearGradient id="plane" x1="1255" y1="145" x2="1350" y2="755" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#ff5870" stop-opacity="0.06"/><stop offset="0.5" stop-color="#ff214a" stop-opacity="0.33"/><stop offset="1" stop-color="#ff5870" stop-opacity="0.08"/></linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="rubyGlow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="7" result="b"/><feColorMatrix in="b" type="matrix" values="1 0 0 0 1 0 0 0 0 .04 0 0 0 0 .12 0 0 0 .9 0" result="c"/><feMerge><feMergeNode in="c"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="92" y="88" fill="#f7fbff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="44">Uneven Temporal Density</text>
  <text x="92" y="126" fill="#8ea6c8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22">different local-time accumulation patterns before the same frontal time plane</text>
  <g opacity=".2" stroke="#1a63bd" fill="none"><path d="M230 160 H1340 V760 H230 Z"/><path d="M230 265 H1340"/><path d="M230 385 H1340"/><path d="M230 505 H1340"/><path d="M230 625 H1340"/><path d="M450 160 V760"/><path d="M675 160 V760"/><path d="M900 160 V760"/><path d="M1125 160 V760"/></g>
  <g filter="url(#rubyGlow)"><polygon points="1260,180 1340,140 1340,780 1260,740" fill="url(#plane)" stroke="#ff4562" stroke-width="4"/><line x1="1340" y1="140" x2="1340" y2="780" stroke="#ff6b7d" stroke-width="5"/></g>
  <text x="1190" y="122" fill="#ff6b7d" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25">frontal time plane</text>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23"><text x="90" y="225" fill="#20eaff">Sparse</text><text x="90" y="345" fill="#6da8ff">Sparse to dense</text><text x="90" y="465" fill="#a98aff">Dense to sparse</text><text x="90" y="585" fill="#ff73df">Burst cluster</text><text x="90" y="705" fill="#ffbd56">Uniform medium</text></g>
  <g fill="none" stroke-width="3.6" stroke-linecap="round" filter="url(#glow)">
    <path d="M250 225 C440 210 620 240 800 225 C980 210 1130 235 1260 230" stroke="#20eaff"/>
    <path d="M250 345 C455 350 640 330 815 348 C995 368 1140 360 1260 350" stroke="#6da8ff"/>
    <path d="M250 465 C450 456 620 476 800 465 C990 454 1135 466 1260 462" stroke="#a98aff"/>
    <path d="M250 585 C460 580 640 575 820 590 C990 605 1135 590 1260 585" stroke="#ff73df"/>
    <path d="M250 705 C450 705 650 705 850 705 C1030 705 1160 705 1260 705" stroke="#ffbd56"/>
  </g>
  <g fill="none" stroke-dasharray="3 11" stroke-width="2.2" stroke-linecap="round" opacity=".72">
