<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Uneven Temporal Density Across History-Space</title>
  <desc id="desc">Five clean temporal-density strings. Event-nodes sit only on realized strings; dotted branches contain no standalone nodes.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="82%"><stop offset="0" stop-color="#07152a"/><stop offset="0.65" stop-color="#020713"/><stop offset="1" stop-color="#00030a"/></radialGradient>
    <linearGradient id="plane" x1="1265" y1="135" x2="1340" y2="790" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#ff6076" stop-opacity="0.06"/><stop offset="0.5" stop-color="#ff244b" stop-opacity="0.33"/><stop offset="1" stop-color="#ff6076" stop-opacity="0.08"/></linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="ruby" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="7" result="b"/><feColorMatrix in="b" type="matrix" values="1 0 0 0 1 0 0 0 0 .04 0 0 0 0 .12 0 0 0 .9 0" result="c"/><feMerge><feMergeNode in="c"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="800" y="78" fill="#f8fbff" font-family="Orbitron, Rajdhani, Segoe UI, Arial, sans-serif" font-size="50" text-anchor="middle">Uneven Temporal Density</text>
  <text x="800" y="122" fill="#8ea6c8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" text-anchor="middle">representative node-spacing patterns before the same frontal time plane</text>
  <g opacity=".16" stroke="#1a63bd" fill="none"><path d="M300 150 H1340 V785 H300 Z"/><path d="M300 250 H1340"/><path d="M300 365 H1340"/><path d="M300 480 H1340"/><path d="M300 595 H1340"/><path d="M300 710 H1340"/><path d="M520 150 V785"/><path d="M740 150 V785"/><path d="M960 150 V785"/><path d="M1180 150 V785"/></g>
  <g filter="url(#ruby)"><polygon points="1265,185 1340,145 1340,775 1265,735" fill="url(#plane)" stroke="#ff4562" stroke-width="4"/><line x1="1340" y1="145" x2="1340" y2="775" stroke="#ff6b7d" stroke-width="5"/></g>
  <text x="1360" y="215" fill="#ff5d73" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24">frontal time</text>
  <g font-family="Inter, Segoe UI, Arial, sans-serif"><text x="80" y="255" fill="#20e8ff" font-size="25">Sparse</text><text x="80" y="285" fill="#d8deeb" font-size="18">few event-nodes</text><text x="80" y="370" fill="#6da8ff" font-size="25">Sparse to dense</text><text x="80" y="400" fill="#d8deeb" font-size="18">increasing density</text><text x="80" y="485" fill="#a98aff" font-size="25">Dense to sparse</text><text x="80" y="515" fill="#d8deeb" font-size="18">spreading out</text><text x="80" y="600" fill="#ff67d8" font-size="25">Burst cluster</text><text x="80" y="630" fill="#d8deeb" font-size="18">local activity peak</text><text x="80" y="715" fill="#ffbd56" font-size="25">Uniform medium</text><text x="80" y="745" fill="#d8deeb" font-size="18">even spacing</text></g>
  <g fill="none" stroke-linecap="round" stroke-width="3.5" filter="url(#glow)"><path d="M300 250 H1265" stroke="#20e8ff"/><path d="M300 365 H1265" stroke="#6da8ff"/><path d="M300 480 H1265" stroke="#a98aff"/><path d="M300 595 H1265" stroke="#ff67d8"/><path d="M300 710 H1265" stroke="#ffbd56"/></g>
  <g fill="none" stroke-linecap="round" stroke-dasharray="3 10" stroke-width="2.1" opacity=".78"><path d="M580 250 C630 205 690 205 740 250" stroke="#20e8ff"/><path d="M970 250 C1020 205 1080 205 1130 250" stroke="#20e8ff"/><path d="M420 365 C470 320 530 320 580 365" stroke="#6da8ff"/><path d="M650 365 C700 320 760 320 810 365" stroke="#6da8ff"/><path d="M920 365 C980 315 1050 320 1110 365" stroke="#b98cff"/><path d="M350 480 C395 440 445 440 490 480" stroke="#a98aff"/><path d="M460 480 C505 440 555 440 600 480" stroke="#a98aff"/><path d="M1020 480 C1070 435 1130 435 1180 480" stroke="#a98aff"/><path d="M700 595 C750 545 810 545 860 595" stroke="#ff67d8"/><path d="M830 595 C880 545 940 545 990 595" stroke="#ff67d8"/><path d="M405 710 C455 665 515 665 565 710" stroke="#ffbd56"/><path d="M630 710 C680 665 740 665 790 710" stroke="#ffbd56"/><path d="M855 710 C905 665 965 665 1015 710" stroke="#ffbd56"/><path d="M1080 710 C1130 665 1190 665 1240 710" stroke="#ffbd56"/></g>
