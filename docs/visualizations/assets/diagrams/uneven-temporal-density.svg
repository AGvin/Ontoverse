<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Uneven Temporal Density</title>
  <desc id="desc">Minimal SVG diagram with five temporal-density patterns. Event-nodes sit only on realized strings.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="82%"><stop offset="0" stop-color="#07152a"/><stop offset="0.65" stop-color="#020713"/><stop offset="1" stop-color="#00030a"/></radialGradient>
    <linearGradient id="plane" x1="1260" y1="170" x2="1340" y2="780" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#ff6076" stop-opacity="0.10"/><stop offset="0.5" stop-color="#ff244b" stop-opacity="0.36"/><stop offset="1" stop-color="#ff6076" stop-opacity="0.12"/></linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="800" y="86" fill="#f8fbff" font-family="Segoe UI, Arial, sans-serif" font-size="54" text-anchor="middle">Uneven Temporal Density</text>
  <text x="800" y="126" fill="#8ea6c8" font-family="Segoe UI, Arial, sans-serif" font-size="22" text-anchor="middle">representative node-spacing patterns before the same frontal time plane</text>
  <g opacity="0.12" stroke="#1a63bd" fill="none"><path d="M300 170 H1340 V780 H300 Z"/><path d="M300 265 H1340"/><path d="M300 380 H1340"/><path d="M300 495 H1340"/><path d="M300 610 H1340"/><path d="M300 725 H1340"/><path d="M520 170 V780"/><path d="M740 170 V780"/><path d="M960 170 V780"/><path d="M1180 170 V780"/></g>
  <polygon points="1260,205 1340,160 1340,790 1260,745" fill="url(#plane)" stroke="#ff4562" stroke-width="4"/>
  <line x1="1340" y1="160" x2="1340" y2="790" stroke="#ff6b7d" stroke-width="5"/>
  <text x="1360" y="225" fill="#ff5d73" font-family="Segoe UI, Arial, sans-serif" font-size="27">frontal time</text>
  <g font-family="Segoe UI, Arial, sans-serif"><text x="105" y="270" fill="#14eaff" font-size="25">Sparse</text><text x="105" y="385" fill="#70b7ff" font-size="25">Sparse to dense</text><text x="105" y="500" fill="#b781ff" font-size="25">Dense to sparse</text><text x="105" y="615" fill="#ff67d8" font-size="25">Burst cluster</text><text x="105" y="730" fill="#ffbd56" font-size="25">Uniform medium</text></g>
  <g fill="none" stroke-linecap="round" stroke-width="5"><path d="M300 265 H1260" stroke="#14eaff"/><path d="M300 380 H1260" stroke="#70b7ff"/><path d="M300 495 H1260" stroke="#b781ff"/><path d="M300 610 H1260" stroke="#ff67d8"/><path d="M300 725 H1260" stroke="#ffbd56"/></g>
  <g fill="#07152a" stroke-width="4">
    <circle cx="300" cy="265" r="8" stroke="#f8fbff"/><circle cx="420" cy="265" r="8" stroke="#14eaff"/><circle cx="700" cy="265" r="8" stroke="#14eaff"/><circle cx="980" cy="265" r="8" stroke="#70b7ff"/><circle cx="1260" cy="265" r="8" stroke="#b781ff"/>
    <circle cx="300" cy="380" r="8" stroke="#f8fbff"/><circle cx="430" cy="380" r="8" stroke="#70b7ff"/><circle cx="630" cy="380" r="8" stroke="#70b7ff"/><circle cx="820" cy="380" r="8" stroke="#8d8fff"/><circle cx="960" cy="380" r="8" stroke="#b781ff"/><circle cx="1080" cy="380" r="8" stroke="#d175ff"/><circle cx="1180" cy="380" r="8" stroke="#e86dff"/><circle cx="1260" cy="380" r="8" stroke="#ff67d8"/>
    <circle cx="300" cy="495" r="8" stroke="#f8fbff"/><circle cx="350" cy="495" r="8" stroke="#b781ff"/><circle cx="380" cy="495" r="8" stroke="#b781ff"/><circle cx="410" cy="495" r="8" stroke="#b781ff"/><circle cx="440" cy="495" r="8" stroke="#b781ff"/><circle cx="470" cy="495" r="8" stroke="#b781ff"/><circle cx="510" cy="495" r="8" stroke="#b781ff"/><circle cx="620" cy="495" r="8" stroke="#b781ff"/><circle cx="760" cy="495" r="8" stroke="#b781ff"/><circle cx="960" cy="495" r="8" stroke="#b781ff"/><circle cx="1160" cy="495" r="8" stroke="#b781ff"/><circle cx="1260" cy="495" r="8" stroke="#b781ff"/>
    <circle cx="300" cy="610" r="8" stroke="#f8fbff"/><circle cx="420" cy="610" r="8" stroke="#ff67d8"/><circle cx="620" cy="610" r="8" stroke="#ff67d8"/><circle cx="720" cy="610" r="8" stroke="#ff67d8"/><circle cx="750" cy="610" r="8" stroke="#ff67d8"/><circle cx="780" cy="610" r="8" stroke="#ff67d8"/><circle cx="810" cy="610" r="8" stroke="#ff67d8"/><circle cx="840" cy="610" r="8" stroke="#ff67d8"/><circle cx="900" cy="610" r="8" stroke="#ff67d8"/><circle cx="1020" cy="610" r="8" stroke="#ff67d8"/><circle cx="1180" cy="610" r="8" stroke="#ff67d8"/><circle cx="1260" cy="610" r="8" stroke="#ff67d8"/>
    <circle cx="300" cy="725" r="8" stroke="#f8fbff"/><circle cx="400" cy="725" r="8" stroke="#ffbd56"/><circle cx="500" cy="725" r="8" stroke="#ffbd56"/><circle cx="600" cy="725" r="8" stroke="#ffbd56"/><circle cx="700" cy="725" r="8" stroke="#ffbd56"/><circle cx="800" cy="725" r="8" stroke="#ffbd56"/><circle cx="900" cy="725" r="8" stroke="#ffbd56"/><circle cx="1000" cy="725" r="8" stroke="#ffbd56"/><circle cx="1100" cy="725" r="8" stroke="#ffbd56"/><circle cx="1200" cy="725" r="8" stroke="#ffbd56"/><circle cx="1260" cy="725" r="8" stroke="#ffbd56"/>
  </g>
  <rect x="430" y="820" width="740" height="52" rx="13" fill="#050a16" stroke="#29354f"/>
  <text x="800" y="854" fill="#aab6d8" font-family="Segoe UI, Arial, sans-serif" font-size="21" text-anchor="middle">Every event-node belongs to a visible realized string.</text>
</svg>