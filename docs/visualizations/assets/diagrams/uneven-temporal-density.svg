    <g><circle cx="250" cy="345" r="7" stroke="#6da8ff"/><circle cx="445" cy="348" r="6" stroke="#6da8ff"/><circle cx="610" cy="335" r="6" stroke="#7f8fff"/><circle cx="750" cy="344" r="6" stroke="#9b7fff"/><circle cx="870" cy="354" r="6" stroke="#b96fff"/><circle cx="980" cy="364" r="6" stroke="#cf6cff"/><circle cx="1080" cy="362" r="6" stroke="#e86aff"/><circle cx="1170" cy="356" r="6" stroke="#ff73df"/><circle cx="1260" cy="350" r="7" stroke="#ff73df"/></g>
    <g><circle cx="250" cy="465" r="7" stroke="#a98aff"/><circle cx="292" cy="464" r="6" stroke="#a98aff"/><circle cx="334" cy="462" r="6" stroke="#a98aff"/><circle cx="376" cy="466" r="6" stroke="#a98aff"/><circle cx="418" cy="468" r="6" stroke="#a98aff"/><circle cx="460" cy="466" r="6" stroke="#a98aff"/><circle cx="502" cy="464" r="6" stroke="#a98aff"/><circle cx="650" cy="470" r="6" stroke="#a98aff"/><circle cx="820" cy="463" r="6" stroke="#a98aff"/><circle cx="1030" cy="458" r="6" stroke="#a98aff"/><circle cx="1260" cy="462" r="7" stroke="#a98aff"/></g>
    <g><circle cx="250" cy="585" r="7" stroke="#ff73df"/><circle cx="470" cy="580" r="6" stroke="#ff73df"/><circle cx="650" cy="576" r="6" stroke="#ff73df"/><circle cx="760" cy="590" r="7" stroke="#ff73df"/><circle cx="790" cy="572" r="6" stroke="#ff73df"/><circle cx="820" cy="590" r="7" stroke="#ff73df"/><circle cx="850" cy="606" r="6" stroke="#ff73df"/><circle cx="880" cy="590" r="7" stroke="#ff73df"/><circle cx="910" cy="574" r="6" stroke="#ff73df"/><circle cx="940" cy="592" r="7" stroke="#ff73df"/><circle cx="1080" cy="596" r="6" stroke="#ff73df"/><circle cx="1260" cy="585" r="7" stroke="#ff73df"/></g>
    <g><circle cx="250" cy="705" r="7" stroke="#ffbd56"/><circle cx="380" cy="705" r="6" stroke="#ffbd56"/><circle cx="510" cy="705" r="6" stroke="#ffbd56"/><circle cx="640" cy="705" r="6" stroke="#ffbd56"/><circle cx="770" cy="705" r="6" stroke="#ffbd56"/><circle cx="900" cy="705" r="6" stroke="#ffbd56"/><circle cx="1030" cy="705" r="6" stroke="#ffbd56"/><circle cx="1160" cy="705" r="6" stroke="#ffbd56"/><circle cx="1260" cy="705" r="7" stroke="#ffbd56"/></g>
  </g>
  <text x="455" y="828" fill="#8ea6c8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22">event-node spacing encodes local temporal-density differences</text>
</svg>
