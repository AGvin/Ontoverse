 stroke="#ff67d8"/><circle cx="300" cy="710" r="7" stroke="#f8fbff"/><circle cx="400" cy="710" r="7" stroke="#ffbd56"/><circle cx="500" cy="710" r="7" stroke="#ffbd56"/><circle cx="600" cy="710" r="7" stroke="#ffbd56"/><circle cx="700" cy="710" r="7" stroke="#ffbd56"/><circle cx="800" cy="710" r="7" stroke="#ffbd56"/><circle cx="900" cy="710" r="7" stroke="#ffbd56"/><circle cx="1000" cy="710" r="7" stroke="#ffbd56"/><circle cx="1100" cy="710" r="7" stroke="#ffbd56"/><circle cx="1200" cy="710" r="7" stroke="#ffbd56"/><circle cx="1265" cy="710" r="7" stroke="#ffbd56"/></g>
  <text x="500" y="835" fill="#8ea6c8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22">Only realized strings carry event-nodes. Branches are dotted and node-free.</text>
</svg>