  <title id="title">Uneven Temporal Density Across History-Space</title>
  <desc id="desc">Representative trajectories with sparse, sparse-to-dense, dense-to-sparse, burst cluster, and uniform medium event-node patterns ending at the frontal time plane.</desc>
