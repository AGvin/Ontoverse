    <path d="M360 345 C420 300 485 300 540 343" stroke="#6da8ff"/><path d="M710 348 C780 285 865 295 940 354" stroke="#8c8cff"/><path d="M1030 356 C1100 300 1180 305 1240 350" stroke="#cf6cff"/>
    <path d="M290 465 C335 415 385 420 430 463" stroke="#a98aff"/><path d="M355 465 C400 415 450 420 495 463" stroke="#a98aff"/><path d="M420 465 C465 415 515 420 560 463" stroke="#a98aff"/><path d="M920 462 C1000 410 1100 420 1180 462" stroke="#a98aff"/>
