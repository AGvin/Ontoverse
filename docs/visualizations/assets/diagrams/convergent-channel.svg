    <circle cx="455" cy="330" r="7" stroke="#20e8ff"/><circle cx="640" cy="365" r="7" stroke="#20e8ff"/><circle cx="820" cy="400" r="7" stroke="#20e8ff"/><circle cx="960" cy="430" r="7" stroke="#20e8ff"/>
    <circle cx="455" cy="385" r="7" stroke="#7db6ff"/><circle cx="640" cy="410" r="7" stroke="#7db6ff"/><circle cx="820" cy="435" r="7" stroke="#7db6ff"/><circle cx="960" cy="445" r="7" stroke="#7db6ff"/>
    <circle cx="455" cy="450" r="7" stroke="#f8fbff"/><circle cx="640" cy="450" r="7" stroke="#f8fbff"/><circle cx="820" cy="450" r="7" stroke="#f8fbff"/><circle cx="960" cy="450" r="7" stroke="#f8fbff"/>
    <circle cx="455" cy="515" r="7" stroke="#b97cff"/><circle cx="640" cy="490" r="7" stroke="#b97cff"/><circle cx="820" cy="465" r="7" stroke="#b97cff"/><circle cx="960" cy="455" r="7" stroke="#b97cff"/>
    <circle cx="455" cy="570" r="7" stroke="#ffbd56"/><circle cx="640" cy="535" r="7" stroke="#ffbd56"/><circle cx="820" cy="500" r="7" stroke="#ffbd56"/><circle cx="960" cy="470" r="7" stroke="#ffbd56"/>
    <circle cx="1120" cy="450" r="7" stroke="#f8fbff"/><circle cx="1180" cy="450" r="7" stroke="#f8fbff"/><circle cx="1230" cy="450" r="7" stroke="#f8fbff"/><circle cx="1265" cy="450" r="8" stroke="#ffbd56"/>
  </g>
  <text x="420" y="805" fill="#8ea6c8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22">Nodes sit on realized strings; dotted curves are branch alternatives without separate nodes.</text>
</svg>