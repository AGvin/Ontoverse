<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Convergent Channel</title>
  <desc id="desc">Distinct historical strings converge into one compatible channel. Event-nodes are placed directly on realized strings and no realized content continues beyond the frontal time plane.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="82%"><stop offset="0" stop-color="#07152a"/><stop offset="0.65" stop-color="#020713"/><stop offset="1" stop-color="#00030a"/></radialGradient>
    <linearGradient id="plane" x1="1260" y1="160" x2="1340" y2="740" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#ff6076" stop-opacity="0.06"/><stop offset="0.5" stop-color="#ff244b" stop-opacity="0.33"/><stop offset="1" stop-color="#ff6076" stop-opacity="0.08"/></linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="ruby" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="7" result="b"/><feColorMatrix in="b" type="matrix" values="1 0 0 0 1 0 0 0 0 .04 0 0 0 0 .12 0 0 0 .9 0" result="c"/><feMerge><feMergeNode in="c"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="800" y="78" fill="#f8fbff" font-family="Orbitron, Rajdhani, Segoe UI, Arial, sans-serif" font-size="50" text-anchor="middle">Convergent Channel</text>
  <text x="800" y="122" fill="#8ea6c8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" text-anchor="middle">distinct historical origins gradually enter a shared locally accessible future channel</text>
  <g opacity=".18" stroke="#1a63bd" fill="none"><path d="M145 170 H1340 V745 H145 Z"/><path d="M145 450 H1340"/><path d="M420 170 V745"/><path d="M700 170 V745"/><path d="M980 170 V745"/></g>
  <g filter="url(#ruby)"><polygon points="1265,190 1340,150 1340,750 1265,710" fill="url(#plane)" stroke="#ff4562" stroke-width="4"/><line x1="1340" y1="150" x2="1340" y2="750" stroke="#ff6b7d" stroke-width="5"/></g>
  <text x="1365" y="315" fill="#ff5d73" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25">frontal time plane</text>
  <text x="160" y="215" fill="#f8fbff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24">distinct historical origins</text>
  <text x="485" y="245" fill="#20e8ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25">divergence</text>
  <text x="770" y="245" fill="#b98cff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25">compatibility filtering</text>
  <text x="1050" y="390" fill="#ffbd56" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25">convergent channel</text>
  <g fill="none" stroke-linecap="round" stroke-width="4" filter="url(#glow)">
    <path d="M170 260 C360 260 455 330 640 365 C820 400 960 430 1120 440 C1180 444 1230 448 1265 450" stroke="#20e8ff"/>
    <path d="M170 355 C365 355 455 385 640 410 C820 435 960 445 1120 448 C1180 449 1230 450 1265 450" stroke="#7db6ff"/>
    <path d="M170 450 H1265" stroke="#f8fbff"/>
    <path d="M170 545 C365 545 455 515 640 490 C820 465 960 455 1120 452 C1180 451 1230 450 1265 450" stroke="#b97cff"/>
    <path d="M170 640 C360 640 455 570 640 535 C820 500 960 470 1120 460 C1180 456 1230 452 1265 450" stroke="#ffbd56"/>
  </g>
  <g fill="none" stroke-linecap="round" stroke-dasharray="3 10" stroke-width="2.2" opacity=".78">
    <path d="M420 320 C470 270 535 270 585 352" stroke="#20e8ff"/><path d="M615 360 C680 305 745 315 805 395" stroke="#20e8ff"/>
    <path d="M410 380 C465 345 525 350 590 405" stroke="#7db6ff"/><path d="M690 430 C750 390 820 395 875 440" stroke="#7db6ff"/>
