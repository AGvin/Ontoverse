<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Temporal Density Comparison</title>
  <desc id="desc">Two trajectories share the same frontal-time interval, but one has sparse event-nodes while the other has dense event-nodes. Both terminate at the ruby frontal time plane.</desc>
  <defs>
    <radialGradient id="bg" cx="45%" cy="50%" r="80%"><stop offset="0" stop-color="#07152a"/><stop offset="0.58" stop-color="#020713"/><stop offset="1" stop-color="#00030a"/></radialGradient>
    <linearGradient id="low" x1="230" y1="310" x2="1260" y2="330" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#18eaff"/><stop offset="0.55" stop-color="#dffaff"/><stop offset="1" stop-color="#b76cff"/></linearGradient>
    <linearGradient id="high" x1="230" y1="585" x2="1260" y2="585" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#20eaff"/><stop offset="0.48" stop-color="#ffffff"/><stop offset="1" stop-color="#ff5de1"/></linearGradient>
    <linearGradient id="plane" x1="1255" y1="170" x2="1350" y2="730" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#ff5870" stop-opacity="0.06"/><stop offset="0.5" stop-color="#ff214a" stop-opacity="0.32"/><stop offset="1" stop-color="#ff5870" stop-opacity="0.08"/></linearGradient>
    <filter id="cyanGlow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="5" result="b"/><feColorMatrix in="b" type="matrix" values="0 0 0 0 0.05 0 0 0 0 0.65 0 0 0 0 1 0 0 0 .9 0" result="c"/><feMerge><feMergeNode in="c"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="rubyGlow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="7" result="b"/><feColorMatrix in="b" type="matrix" values="1 0 0 0 1 0 0 0 0 .04 0 0 0 0 .12 0 0 0 .9 0" result="c"/><feMerge><feMergeNode in="c"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="whiteGlow" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#ffffff" flood-opacity="0.45"/></filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="92" y="88" fill="#f7fbff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="44">Temporal Density Comparison</text>
  <text x="92" y="126" fill="#8ea6c8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22">same frontal-time interval, different accumulated event-nodes</text>
  <g opacity=".22" stroke="#1b67c9" fill="none"><path d="M120 170 H1350 V735 H120 Z"/><path d="M120 450 H1350"/><path d="M300 170 V735"/><path d="M520 170 V735"/><path d="M740 170 V735"/><path d="M960 170 V735"/><path d="M1180 170 V735"/></g>
  <g filter="url(#rubyGlow)"><polygon points="1260,185 1335,145 1335,755 1260,715" fill="url(#plane)" stroke="#ff4562" stroke-width="4"/><line x1="1335" y1="145" x2="1335" y2="755" stroke="#ff6b7d" stroke-width="5"/></g>
  <text x="1185" y="130" fill="#ff6b7d" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26">frontal time plane</text>
  <line x1="160" y1="770" x2="1335" y2="770" stroke="#ff4562" stroke-width="2" filter="url(#rubyGlow)"/><path d="M1335 770 L1314 759 L1314 781 Z" fill="#ff4562" filter="url(#rubyGlow)"/><text x="1365" y="782" fill="#ff6b7d" font-size="32" font-family="Inter, Segoe UI, Arial, sans-serif" font-style="italic">t</text>
  <text x="155" y="298" fill="#20eaff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30">Low temporal density</text>
  <path d="M220 330 C370 302 460 350 600 330 C760 306 880 350 1020 330 C1135 314 1210 330 1260 330" stroke="url(#low)" stroke-width="5" fill="none" filter="url(#cyanGlow)"/>
  <g stroke="#45e9ff" stroke-dasharray="3 11" stroke-linecap="round" opacity=".75" fill="none"><path d="M350 315 C400 250 480 260 530 315"/><path d="M595 330 C650 385 735 380 790 332"/><path d="M1015 330 C1065 270 1140 285 1195 326"/></g>
  <g filter="url(#cyanGlow)" fill="#f8fbff" stroke-width="4"><circle cx="220" cy="330" r="10" stroke="#20eaff"/><circle cx="600" cy="330" r="10" stroke="#8befff"/><circle cx="1020" cy="330" r="10" stroke="#c290ff"/><circle cx="1260" cy="330" r="9" stroke="#ff8ce7"/></g>
  <text x="155" y="560" fill="#ff78e6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30">High temporal density</text>
  <path d="M220 585 C390 570 535 605 700 585 C870 565 1030 605 1260 585" stroke="url(#high)" stroke-width="5" fill="none" filter="url(#cyanGlow)"/>
  <g stroke="#dd69ff" stroke-dasharray="3 10" stroke-linecap="round" opacity=".72" fill="none">
    <path d="M250 585 C282 540 322 540 354 584"/><path d="M350 585 C382 630 430 630 462 586"/><path d="M455 585 C490 540 535 540 570 585"/><path d="M565 585 C600 630 650 630 685 586"/><path d="M690 585 C725 540 775 540 810 585"/><path d="M810 585 C850 630 905 630 945 586"/><path d="M940 585 C985 540 1040 540 1085 585"/><path d="M1085 585 C1130 630 1190 630 1235 585"/>
  </g>
  <g filter="url(#cyanGlow)" fill="#f8fbff" stroke-width="3">
    <circle cx="220" cy="585" r="8" stroke="#20eaff"/><circle cx="295" cy="580" r="7" stroke="#20eaff"/><circle cx="370" cy="590" r="7" stroke="#51caff"/><circle cx="445" cy="582" r="7" stroke="#74aaff"/><circle cx="520" cy="594" r="7" stroke="#9690ff"/><circle cx="595" cy="586" r="7" stroke="#b87dff"/><circle cx="670" cy="590" r="7" stroke="#e6e8ff"/><circle cx="745" cy="582" r="7" stroke="#f3f8ff"/><circle cx="820" cy="576" r="7" stroke="#f8fbff"/><circle cx="895" cy="585" r="7" stroke="#d687ff"/><circle cx="970" cy="595" r="7" stroke="#d26cff"/><circle cx="1045" cy="590" r="7" stroke="#ed61ff"/><circle cx="1120" cy="582" r="7" stroke="#ff61e7"/><circle cx="1195" cy="584" r="7" stroke="#ff77e9"/><circle cx="1260" cy="585" r="8" stroke="#ff8ce7"/>
  </g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22"><text x="470" y="820" fill="#f7fbff">temporal density ~ event-nodes / frontal-time interval</text><text x="470" y="850" fill="#8ea6c8">realized nodes stop at the frontal time plane</text></g>
</svg>
