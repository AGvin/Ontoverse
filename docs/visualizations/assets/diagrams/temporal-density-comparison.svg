<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Temporal Density Comparison</title>
  <desc id="desc">Low and high temporal-density strings. All event-nodes are placed directly on realized strings and all strings stop at the frontal time plane.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%"><stop offset="0" stop-color="#07152a"/><stop offset="0.65" stop-color="#020713"/><stop offset="1" stop-color="#00030a"/></radialGradient>
    <linearGradient id="low" x1="260" y1="335" x2="1240" y2="335" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#16e8ff"/><stop offset="0.55" stop-color="#f8fbff"/><stop offset="1" stop-color="#ba74ff"/></linearGradient>
    <linearGradient id="high" x1="260" y1="575" x2="1240" y2="575" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#16e8ff"/><stop offset="0.5" stop-color="#f8fbff"/><stop offset="1" stop-color="#ff62e6"/></linearGradient>
    <linearGradient id="plane" x1="1240" y1="170" x2="1330" y2="740" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#ff6076" stop-opacity="0.06"/><stop offset="0.5" stop-color="#ff244b" stop-opacity="0.33"/><stop offset="1" stop-color="#ff6076" stop-opacity="0.08"/></linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="ruby" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="7" result="b"/><feColorMatrix in="b" type="matrix" values="1 0 0 0 1 0 0 0 0 .04 0 0 0 0 .12 0 0 0 .9 0" result="c"/><feMerge><feMergeNode in="c"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="800" y="78" fill="#f8fbff" font-family="Orbitron, Rajdhani, Segoe UI, Arial, sans-serif" font-size="48" text-anchor="middle">Temporal Density Comparison</text>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24"><text x="540" y="140" fill="#f8fbff">temporal density ~ </text><text x="760" y="140" fill="#20e8ff">event-nodes</text><text x="925" y="140" fill="#f8fbff"> / </text><text x="960" y="140" fill="#ff526b">frontal-time interval</text><text x="590" y="178" fill="#f8fbff">local time ~ accumulated significant </text><text x="960" y="178" fill="#c67cff">event-nodes</text></g>
  <g opacity=".18" stroke="#1a63bd" fill="none"><path d="M260 210 H1330 V720 H260 Z"/><path d="M260 455 H1330"/><path d="M500 210 V720"/><path d="M740 210 V720"/><path d="M980 210 V720"/></g>
  <g filter="url(#ruby)"><polygon points="1240,205 1328,155 1328,745 1240,695" fill="url(#plane)" stroke="#ff4562" stroke-width="4"/><line x1="1328" y1="155" x2="1328" y2="745" stroke="#ff6b7d" stroke-width="5"/></g>
  <text x="1185" y="196" fill="#ff5d73" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24">frontal time plane</text>
  <line x1="260" y1="238" x2="1240" y2="238" stroke="#ff4562" stroke-dasharray="7 10"/><text x="640" y="224" fill="#ff526b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25">equal frontal-time interval</text>
  <text x="650" y="305" fill="#20e8ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30">Low temporal density</text>
  <path d="M260 335 H1240" stroke="url(#low)" stroke-width="4" filter="url(#glow)"/>
  <g fill="none" stroke="#b97cff" stroke-dasharray="3 9" stroke-width="2.2"><path d="M1120 335 C1170 292 1210 292 1240 335"/><path d="M1120 335 C1170 378 1210 378 1240 335"/></g>
  <g filter="url(#glow)" fill="#07152a" stroke-width="4"><circle cx="260" cy="335" r="8" stroke="#16e8ff"/><circle cx="620" cy="335" r="8" stroke="#dffaff"/><circle cx="980" cy="335" r="8" stroke="#b98cff"/><circle cx="1240" cy="335" r="8" stroke="#c978ff"/></g>
  <text x="650" y="545" fill="#ff75e6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30">High temporal density</text>
  <path d="M260 575 H1240" stroke="url(#high)" stroke-width="4" filter="url(#glow)"/>
  <g fill="none" stroke="#ff75e6" stroke-dasharray="3 9" stroke-width="2.1" opacity=".8"><path d="M540 575 C585 532 630 532 675 575"/><path d="M760 575 C805 618 850 618 895 575"/><path d="M1030 575 C1080 532 1130 532 1180 575"/></g>
  <g filter="url(#glow)" fill="#07152a" stroke-width="3.5"><circle cx="260" cy="575" r="7" stroke="#16e8ff"/><circle cx="320" cy="575" r="7" stroke="#28dcff"/><circle cx="380" cy="575" r="7" stroke="#43caff"/><circle cx="440" cy="575" r="7" stroke="#5ab7ff"/><circle cx="500" cy="575" r="7" stroke="#72a5ff"/><circle cx="560" cy="575" r="7" stroke="#8a94ff"/><circle cx="620" cy="575" r="7" stroke="#a482ff"/><circle cx="680" cy="575" r="7" stroke="#b98cff"/><circle cx="740" cy="575" r="7" stroke="#dffaff"/><circle cx="800" cy="575" r="7" stroke="#f8fbff"/><circle cx="860" cy="575" r="7" stroke="#e9a4ff"/><circle cx="920" cy="575" r="7" stroke="#dc87ff"/><circle cx="980" cy="575" r="7" stroke="#d16cff"/><circle cx="1040" cy="575" r="7" stroke="#e466ff"/><circle cx="1100" cy="575" r="7" stroke="#f560f0"/><circle cx="1160" cy="575" r="7" stroke="#ff62e6"/><circle cx="1240" cy="575" r="7" stroke="#ff75e6"/></g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22"><text x="520" y="775" fill="#f8fbff">Event-nodes are placed only on realized strings.</text><text x="520" y="807" fill="#8ea6c8">Dotted curves are potential branches and contain no separate nodes.</text></g>
</svg>