<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Branch metric, gravity, and local time-rate interpretation</title>
  <desc id="desc">Ontoverse diagram showing absolute and branch baseline metrics, local metric deviations, causal processing density, time-rate gradients, gravity, and gravitational waves.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0" stop-color="#07142f"/>
      <stop offset="0.62" stop-color="#020713"/>
      <stop offset="1" stop-color="#00030a"/>
    </radialGradient>
    <linearGradient id="cyanLine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58f7ff"/>
      <stop offset="1" stop-color="#0586ff"/>
    </linearGradient>
    <linearGradient id="violetLine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c46cff"/>
      <stop offset="1" stop-color="#3b46ff"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7a0"/>
      <stop offset="1" stop-color="#ffb21f"/>
    </linearGradient>
    <filter id="glowCyan" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#58f7ff"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffd35b"/>
    </marker>
    <style>
      .panel{fill:rgba(3,10,24,.82);stroke:#1bc8ff;stroke-width:1.4;rx:14;filter:url(#glowCyan)}
      .subpanel{fill:rgba(1,6,17,.78);stroke:#5af7ff;stroke-width:1;rx:10}
      .title{font-family:Inter,Arial,sans-serif;font-weight:800;font-size:27px;fill:#fff;letter-spacing:.5px}
      .heading{font-family:Inter,Arial,sans-serif;font-weight:800;font-size:20px;fill:#fff}
      .label{font-family:Inter,Arial,sans-serif;font-size:16px;fill:#dffcff}
      .small{font-family:Inter,Arial,sans-serif;font-size:13.5px;fill:#c5f6ff}
      .tiny{font-family:Inter,Arial,sans-serif;font-size:12px;fill:#9eeeff}
      .cyan{fill:#55f7ff}.violet{fill:#c47cff}.gold{fill:#ffd35b}.red{fill:#ff4d55}.white{fill:#ffffff}
      .grid{fill:none;stroke:#167eea;stroke-width:1;opacity:.75}
      .grid2{fill:none;stroke:#2eeaff;stroke-width:.7;opacity:.42}
      .dash{stroke-dasharray:5 7}
      .node{fill:#52f7ff;filter:url(#glowStrong)}
      .nodeV{fill:#b469ff;filter:url(#glowStrong)}
      .nodeG{fill:#ffd45e;filter:url(#glowStrong)}
      .boxText{font-family:Inter,Arial,sans-serif;font-size:17px;fill:#fff}
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <g opacity=".18">
    <path d="M0 140 C260 100 380 170 600 130 S980 110 1220 170 1480 125 1600 145" fill="none" stroke="#1b9cff"/>
    <path d="M0 810 C300 760 430 845 690 790 S1050 760 1260 835 1490 775 1600 805" fill="none" stroke="#8c5dff"/>
  </g>

  <!-- Right frontal time plane -->
  <g transform="translate(1440 35)">
    <text x="75" y="0" class="heading red" text-anchor="middle">FRONTAL</text>
    <text x="75" y="24" class="heading red" text-anchor="middle">TIME PLANE</text>
    <text x="75" y="48" class="small red" text-anchor="middle">now</text>
    <polygon points="45,110 130,50 130,735 45,835" fill="rgba(255,40,65,.12)" stroke="#ff4d55" stroke-width="2" filter="url(#glowStrong)"/>
    <g stroke="#ff4d55" stroke-width=".8" opacity=".65">
      <path d="M58 101 L58 820"/><path d="M72 91 L72 804"/><path d="M86 81 L86 787"/><path d="M100 71 L100 770"/><path d="M114 61 L114 752"/>
      <path d="M47 165 L129 105"/><path d="M47 225 L129 166"/><path d="M47 285 L129 227"/><path d="M47 345 L129 288"/><path d="M47 405 L129 349"/><path d="M47 465 L129 410"/><path d="M47 525 L129 471"/><path d="M47 585 L129 532"/><path d="M47 645 L129 593"/><path d="M47 705 L129 654"/>
    </g>
    <line x1="92" y1="820" x2="92" y2="910" stroke="#ff4d55" stroke-width="3" marker-end="url(#arrowGold)"/>
    <text x="92" y="948" class="heading red" text-anchor="middle">TIME FLOW</text>
  </g>

  <!-- Section 1 -->
  <rect x="22" y="22" width="600" height="360" class="panel"/>
  <circle cx="58" cy="62" r="22" fill="rgba(17,220,255,.15)" stroke="#55f7ff" stroke-width="3" filter="url(#glowCyan)"/>
  <text x="58" y="70" class="title cyan" text-anchor="middle">1</text>
  <text x="92" y="69" class="title">ABSOLUTE vs BRANCH BASELINE</text>

  <rect x="50" y="100" width="260" height="210" class="subpanel"/>
  <text x="70" y="128" class="heading cyan">A</text>
  <text x="105" y="128" class="heading">Absolute Baseline Metric</text>
  <g transform="translate(180 200)" stroke="#63f8ff" stroke-width="1.2" opacity=".9">
    <line x1="-95" y1="0" x2="95" y2="0"/><line x1="0" y1="75" x2="0" y2="-75" marker-end="url(#arrowCyan)"/><line x1="-55" y1="55" x2="0" y2="0"/>
    <circle cx="0" cy="0" r="7" fill="#fff" filter="url(#glowStrong)"/>
    <ellipse cx="0" cy="0" rx="80" ry="32" fill="none" opacity=".25"/>
    <text x="12" y="-62" class="small cyan">t</text><text x="104" y="5" class="small cyan">x</text><text x="-64" y="66" class="small cyan">y</text>
  </g>
  <text x="68" y="270" class="small">• shared conceptual zero-point</text>
  <text x="68" y="292" class="small">• no mass, no gravity, no meaningful events</text>

  <rect x="340" y="100" width="250" height="210" class="subpanel"/>
  <text x="360" y="128" class="heading cyan">B</text>
  <text x="395" y="128" class="heading">Branch Baseline Metric</text>
  <g transform="translate(360 152)">
    <path d="M0 60 C45 20 88 95 135 48 S215 22 235 70" fill="none" stroke="url(#cyanLine)" opacity=".75"/>
    <path d="M0 95 C42 70 86 122 130 84 S197 62 235 102" fill="none" stroke="url(#violetLine)" opacity=".6"/>
    <path d="M0 130 C52 100 88 150 136 120 S208 96 235 135" fill="none" stroke="#277dff" opacity=".5"/>
    <g>
      <circle class="node" cx="22" cy="62" r="3"/><circle class="node" cx="55" cy="45" r="4"/><circle class="nodeV" cx="88" cy="93" r="4"/><circle class="node" cx="122" cy="54" r="5"/><circle class="node" cx="160" cy="38" r="3"/><circle class="nodeV" cx="185" cy="96" r="5"/><circle class="node" cx="220" cy="75" r="4"/>
      <circle class="node" cx="42" cy="123" r="3"/><circle class="nodeV" cx="78" cy="145" r="4"/><circle class="node" cx="122" cy="118" r="3"/><circle class="node" cx="172" cy="112" r="4"/><circle class="node" cx="218" cy="132" r="3"/>
    </g>
  </g>
  <text x="360" y="242" class="small">• average mass-energy background</text>
  <text x="360" y="264" class="small">• average causal processing density</text>
  <text x="360" y="286" class="small">• default branch time rate</text>
  <path d="M310 205 L335 205" stroke="#55f7ff" stroke-width="3" marker-end="url(#arrowCyan)" filter="url(#glowCyan)"/>
  <rect x="52" y="330" width="540" height="34" rx="8" fill="rgba(0,20,36,.88)" stroke="#55f7ff"/>
  <text x="322" y="353" class="boxText" text-anchor="middle">branch baseline metric → average causal processing density → branch time rate</text>

  <!-- Section 2 -->
  <rect x="645" y="22" width="740" height="360" class="panel"/>
  <circle cx="682" cy="62" r="22" fill="rgba(17,220,255,.15)" stroke="#55f7ff" stroke-width="3" filter="url(#glowCyan)"/>
  <text x="682" y="70" class="title cyan" text-anchor="middle">2</text>
  <text x="716" y="69" class="title">LOCAL METRIC DEVIATIONS</text>
  <text x="1018" y="107" class="small cyan" text-anchor="middle">branch baseline metric: average field of the branch</text>
  <g transform="translate(700 150)">
    <path d="M0 80 C80 40 150 110 220 75 C300 35 355 185 430 75 C520 -10 580 230 660 80 C720 40 780 50 835 92" fill="none" stroke="url(#cyanLine)" stroke-width="2"/>
    <g class="grid">
      <path d="M0 120 C85 80 155 145 230 112 C310 70 360 215 430 110 C520 15 580 255 660 118 C728 85 785 92 835 130"/>
      <path d="M0 160 C90 120 155 182 230 150 C312 108 360 248 430 150 C522 55 582 290 660 155 C730 125 785 130 835 168"/>
      <path d="M20 38 L25 185"/><path d="M105 48 L110 190"/><path d="M190 52 L200 200"/><path d="M275 42 L285 220"/><path d="M360 40 L375 245"/><path d="M445 38 L465 258"/><path d="M530 48 L548 240"/><path d="M615 52 L625 218"/><path d="M700 56 L705 195"/><path d="M785 66 L785 185"/>
    </g>
    <circle class="node" cx="135" cy="78" r="9"/><text x="135" y="-14" class="label" text-anchor="middle">planet</text><line x1="135" y1="2" x2="135" y2="65" stroke="#fff" opacity=".7"/>
    <circle class="nodeG" cx="365" cy="76" r="15"/><text x="365" y="-14" class="label" text-anchor="middle">star</text><line x1="365" y1="2" x2="365" y2="58" stroke="#fff" opacity=".7"/>
    <ellipse cx="545" cy="82" rx="35" ry="13" fill="#050009" stroke="#d87cff" stroke-width="4" filter="url(#glowStrong)"/><text x="545" y="-14" class="label" text-anchor="middle">black hole</text><line x1="545" y1="2" x2="545" y2="62" stroke="#fff" opacity=".7"/>
    <ellipse cx="760" cy="80" rx="52" ry="34" fill="none" stroke="#55f7ff" stroke-dasharray="3 5" filter="url(#glowCyan)"/><text x="760" y="-28" class="label" text-anchor="middle">low-density</text><text x="760" y="-8" class="label" text-anchor="middle">region</text>
    <g opacity=".95">
      <circle class="node" cx="96" cy="96" r="2"/><circle class="node" cx="122" cy="104" r="2"/><circle class="node" cx="152" cy="94" r="2"/>
      <circle class="nodeG" cx="335" cy="100" r="3"/><circle class="nodeG" cx="345" cy="122" r="2"/><circle class="nodeG" cx="378" cy="116" r="3"/><circle class="nodeG" cx="390" cy="92" r="2"/><circle class="nodeG" cx="360" cy="140" r="2"/>
      <circle class="nodeV" cx="520" cy="120" r="3"/><circle class="nodeV" cx="535" cy="145" r="2"/><circle class="nodeV" cx="565" cy="128" r="3"/><circle class="nodeV" cx="552" cy="164" r="2"/><circle class="nodeV" cx="575" cy="103" r="2"/>
      <circle class="node" cx="722" cy="78" r="2"/><circle class="node" cx="765" cy="112" r="2"/><circle class="node" cx="805" cy="88" r="2"/>
    </g>
    <text x="365" y="215" class="small violet" text-anchor="middle">local metric deviation</text>
    <path d="M265 196 L600 196" stroke="#b56cff"/><path d="M265 188 L265 204" stroke="#b56cff"/><path d="M600 188 L600 204" stroke="#b56cff"/>
  </g>

  <!-- Section 3 -->
  <rect x="22" y="410" width="1363" height="280" class="panel"/>
  <circle cx="58" cy="442" r="22" fill="rgba(17,220,255,.15)" stroke="#55f7ff" stroke-width="3" filter="url(#glowCyan)"/>
  <text x="58" y="450" class="title cyan" text-anchor="middle">3</text>
  <text x="92" y="449" class="title">MASS, TIME-RATE GRADIENT, AND GRAVITY</text>
  <g transform="translate(50 475)">
    <g>
      <rect width="390" height="32" rx="7" fill="rgba(0,20,36,.88)" stroke="#1bc8ff"/><text x="195" y="22" class="boxText" text-anchor="middle">mass-energy concentration</text>
      <rect y="45" width="390" height="32" rx="7" fill="rgba(0,20,36,.88)" stroke="#1bc8ff"/><text x="195" y="67" class="boxText" text-anchor="middle">causal processing density increase</text>
      <rect y="90" width="390" height="32" rx="7" fill="rgba(0,20,36,.88)" stroke="#1bc8ff"/><text x="195" y="112" class="boxText" text-anchor="middle">local time-rate slowdown</text>
      <rect y="135" width="390" height="32" rx="7" fill="rgba(0,20,36,.88)" stroke="#1bc8ff"/><text x="195" y="157" class="boxText" text-anchor="middle">local time-rate gradient</text>
      <rect y="180" width="390" height="32" rx="7" fill="rgba(0,20,36,.88)" stroke="#1bc8ff"/><text x="195" y="202" class="boxText" text-anchor="middle">curved possible trajectories</text>
      <rect y="225" width="390" height="34" rx="7" fill="rgba(33,20,0,.78)" stroke="#ffd35b"/><text x="195" y="249" class="boxText gold" text-anchor="middle">gravitational effect</text>
      <g stroke="#55f7ff" stroke-width="2.5" marker-end="url(#arrowCyan)"><line x1="195" y1="32" x2="195" y2="45"/><line x1="195" y1="77" x2="195" y2="90"/><line x1="195" y1="122" x2="195" y2="135"/><line x1="195" y1="167" x2="195" y2="180"/><line x1="195" y1="212" x2="195" y2="225"/></g>
    </g>
  </g>
  <g transform="translate(525 445)">
    <text x="350" y="0" class="small cyan" text-anchor="middle">gravity well: local metric depression</text>
    <ellipse cx="350" cy="135" rx="285" ry="98" fill="none" stroke="#167eea" opacity=".65"/>
    <ellipse cx="350" cy="135" rx="210" ry="70" fill="none" stroke="#167eea" opacity=".75"/>
    <ellipse cx="350" cy="135" rx="120" ry="40" fill="none" stroke="#55f7ff" opacity=".7"/>
    <path d="M70 135 C170 55 255 205 350 135 C450 55 535 205 635 135" fill="none" stroke="url(#cyanLine)" stroke-width="2" opacity=".9"/>
    <path d="M120 85 C220 35 285 135 350 135 C430 130 505 70 585 92" fill="none" stroke="#ffd35b" stroke-width="4" marker-end="url(#arrowGold)" filter="url(#glowStrong)"/>
    <path d="M80 175 C205 220 285 150 350 135 C455 108 520 178 620 160" fill="none" stroke="#55f7ff" stroke-width="4" marker-end="url(#arrowCyan)" filter="url(#glowCyan)"/>
    <circle class="nodeG" cx="350" cy="135" r="27"/>
    <g stroke="#1c89ff" opacity=".5"><line x1="350" y1="45" x2="350" y2="225"/><line x1="245" y1="65" x2="455" y2="205"/><line x1="455" y1="65" x2="245" y2="205"/></g>
    <rect x="690" y="35" width="150" height="62" rx="8" fill="rgba(0,20,36,.88)" stroke="#55f7ff"/><text x="765" y="60" class="small" text-anchor="middle">depth =</text><text x="765" y="80" class="small" text-anchor="middle">local time-rate</text><text x="765" y="100" class="small" text-anchor="middle">slowdown</text>
    <rect x="690" y="150" width="160" height="66" rx="8" fill="rgba(33,20,0,.72)" stroke="#ffd35b"/><text x="770" y="174" class="small" text-anchor="middle">slope =</text><text x="770" y="194" class="small" text-anchor="middle">trajectory-changing</text><text x="770" y="214" class="small" text-anchor="middle">gradient</text>
    <line x1="660" y1="45" x2="660" y2="135" stroke="#fff" stroke-dasharray="4 4" marker-end="url(#arrowCyan)" marker-start="url(#arrowCyan)"/>
  </g>

  <!-- Section 4 -->
  <rect x="22" y="720" width="1230" height="210" class="panel"/>
  <circle cx="58" cy="754" r="22" fill="rgba(17,220,255,.15)" stroke="#55f7ff" stroke-width="3" filter="url(#glowCyan)"/>
  <text x="58" y="762" class="title cyan" text-anchor="middle">4</text>
  <text x="92" y="761" class="title">GRAVITATIONAL WAVE</text>
  <text x="600" y="757" class="small violet" text-anchor="middle">moving local metric deviation</text>
  <path d="M690 750 L780 750" stroke="#c47cff" stroke-width="3" marker-end="url(#arrowCyan)"/>
  <g transform="translate(55 785)">
    <path d="M0 70 C65 10 130 10 195 70 S325 130 390 70 S520 10 585 70 S715 130 780 70" fill="none" stroke="url(#violetLine)" stroke-width="8" filter="url(#glowStrong)"/>
    <path d="M0 100 C65 40 130 40 195 100 S325 160 390 100 S520 40 585 100 S715 160 780 100" fill="none" stroke="url(#cyanLine)" stroke-width="2"/>
    <g class="grid2">
      <path d="M0 45 C65 -15 130 -15 195 45 S325 105 390 45 S520 -15 585 45 S715 105 780 45"/>
      <path d="M0 125 C65 65 130 65 195 125 S325 185 390 125 S520 65 585 125 S715 185 780 125"/>
      <line x1="0" y1="35" x2="0" y2="135"/><line x1="98" y1="20" x2="98" y2="150"/><line x1="195" y1="45" x2="195" y2="125"/><line x1="292" y1="70" x2="292" y2="170"/><line x1="390" y1="45" x2="390" y2="125"/><line x1="488" y1="20" x2="488" y2="150"/><line x1="585" y1="45" x2="585" y2="125"/><line x1="682" y1="70" x2="682" y2="170"/><line x1="780" y1="45" x2="780" y2="125"/>
    </g>
    <g><circle class="nodeV" cx="72" cy="54" r="3"/><circle class="node" cx="145" cy="42" r="3"/><circle class="node" cx="260" cy="118" r="3"/><circle class="nodeV" cx="385" cy="68" r="3"/><circle class="node" cx="532" cy="43" r="3"/><circle class="node" cx="680" cy="128" r="3"/></g>
    <text x="102" y="173" class="label violet" text-anchor="middle">stretch</text><text x="292" y="173" class="label cyan" text-anchor="middle">compression</text><text x="492" y="173" class="label violet" text-anchor="middle">stretch</text><text x="682" y="173" class="label cyan" text-anchor="middle">compression</text>
  </g>
  <rect x="875" y="755" width="330" height="140" rx="10" fill="rgba(10,4,28,.78)" stroke="#c47cff"/>
  <text x="1040" y="782" class="small violet" text-anchor="middle">gravitational wave</text>
  <text x="1040" y="807" class="small" text-anchor="middle">↓ spatial stretch/compression</text>
  <text x="1040" y="832" class="small cyan" text-anchor="middle">↓ causal processing density fluctuation</text>
  <text x="1040" y="857" class="small cyan" text-anchor="middle">↓ local time-rate gradient fluctuation</text>
  <text x="1040" y="882" class="small" text-anchor="middle">↓ transient trajectory distortion</text>

  <!-- Analogy note -->
  <rect x="1270" y="720" width="190" height="210" rx="10" fill="rgba(12,0,9,.78)" stroke="#ff4d55"/>
  <text x="1365" y="750" class="heading red" text-anchor="middle">Illustrative Analogy</text>
  <ellipse cx="1365" cy="805" rx="55" ry="20" fill="none" stroke="#c47cff" stroke-width="4" filter="url(#glowStrong)"/>
  <ellipse cx="1365" cy="805" rx="28" ry="11" fill="#020208" stroke="#8d66ff"/>
  <text x="1365" y="855" class="tiny white" text-anchor="middle">world near a black hole:</text>
  <text x="1365" y="877" class="tiny" text-anchor="middle">for a distant observer,</text>
  <text x="1365" y="895" class="tiny" text-anchor="middle">local processes appear</text>
  <text x="1365" y="913" class="tiny" text-anchor="middle">almost frozen.</text>

  <!-- Footer legend -->
  <rect x="22" y="950" width="1530" height="36" rx="9" fill="rgba(0,10,20,.9)" stroke="#1269c8"/>
  <circle class="node" cx="65" cy="968" r="5"/><text x="85" y="973" class="tiny">event-node</text>
  <path d="M190 968 L255 968" stroke="#9eeeff" stroke-dasharray="3 4" marker-end="url(#arrowCyan)"/><text x="268" y="973" class="tiny">possible trajectory</text>
  <rect x="430" y="958" width="36" height="20" fill="none" stroke="#1688ff"/><text x="480" y="973" class="tiny">metric surface</text>
  <circle class="nodeG" cx="635" cy="968" r="7"/><text x="655" y="973" class="tiny">mass-energy concentration</text>
  <rect x="860" y="958" width="42" height="20" fill="url(#violetLine)" opacity=".65"/><text x="915" y="973" class="tiny">higher causal processing density</text>
  <circle cx="1190" cy="968" r="11" fill="none" stroke="#fff"/><path d="M1190 968 L1190 960 M1190 968 L1197 972" stroke="#fff"/><text x="1210" y="973" class="tiny">slower local time rate</text>
  <text x="1515" y="973" class="tiny cyan" text-anchor="end">All effects are local metric consequences within a branch.</text>
</svg>
