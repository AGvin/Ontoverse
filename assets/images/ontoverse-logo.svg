<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Ontoverse logo</title>
  <desc id="desc">A branching history-space emblem with a ruby frontal time axis and Ontoverse wordmark.</desc>
  <defs>
    <radialGradient id="originGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fff7d6"/>
      <stop offset="0.45" stop-color="#fff7d6" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#fff7d6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="branchGradient" x1="80" y1="80" x2="420" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4ddcff"/>
      <stop offset="0.55" stop-color="#f8f7ff"/>
      <stop offset="1" stop-color="#c15cff"/>
    </linearGradient>
    <linearGradient id="iconRing" x1="120" y1="330" x2="420" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#32d7ff"/>
      <stop offset="1" stop-color="#b15cff"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="570" y1="210" x2="1130" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.72" stop-color="#edf7ff"/>
      <stop offset="1" stop-color="#b9d5ff"/>
    </linearGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="rubyGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="rubyArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff244f"/>
    </marker>
  </defs>

  <rect width="1200" height="420" fill="#05070d"/>

  <g transform="translate(70 20)">
    <ellipse cx="230" cy="302" rx="128" ry="24" fill="none" stroke="#6be9ff" stroke-opacity="0.55"/>
    <ellipse cx="230" cy="302" rx="90" ry="17" fill="none" stroke="#f8f7ff" stroke-opacity="0.45"/>
    <ellipse cx="230" cy="302" rx="54" ry="10" fill="none" stroke="#fff7d6" stroke-opacity="0.65"/>
    <circle cx="230" cy="286" r="34" fill="url(#originGlow)" opacity="0.65"/>
    <circle cx="230" cy="286" r="8" fill="#fff8d8" filter="url(#softGlow)"/>

    <line x1="0" y1="260" x2="425" y2="260" stroke="#ff244f" stroke-width="2.6" marker-end="url(#rubyArrow)" filter="url(#rubyGlow)"/>
    <text x="440" y="268" fill="#ff335c" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-style="italic" filter="url(#rubyGlow)">t</text>
    <g fill="#fff6f8" stroke="#ff244f" stroke-width="2" filter="url(#rubyGlow)">
      <circle cx="0" cy="260" r="5"/>
      <circle cx="92" cy="260" r="4"/>
      <circle cx="154" cy="260" r="4"/>
      <circle cx="230" cy="260" r="5"/>
      <circle cx="304" cy="260" r="4"/>
      <circle cx="372" cy="260" r="4"/>
    </g>

    <line x1="230" y1="286" x2="230" y2="42" stroke="#dce9ff" stroke-width="2" opacity="0.8"/>
    <g fill="none" stroke="url(#branchGradient)" stroke-width="2.2" stroke-linecap="round">
      <path d="M230 286 C210 238 182 210 130 184 C96 167 62 150 38 130"/>
      <path d="M230 286 C206 232 206 178 156 132 C122 100 84 92 54 84"/>
      <path d="M230 286 C229 218 230 164 230 106 C230 80 230 58 230 42"/>
      <path d="M230 286 C248 236 278 211 332 190 C370 176 395 150 416 118"/>
      <path d="M230 286 C266 230 312 168 354 98"/>
      <path d="M230 286 C190 228 142 230 94 246"/>
      <path d="M230 286 C270 230 302 242 348 246"/>
      <path d="M156 132 C150 174 138 198 94 204"/>
      <path d="M156 132 C184 134 206 150 210 178"/>
      <path d="M354 98 C338 128 322 154 322 190"/>
      <path d="M354 98 C386 94 408 84 430 60"/>
    </g>

    <g fill="none" stroke="#7bdcff" stroke-width="1.5" stroke-dasharray="2 8" opacity="0.7">
      <path d="M38 130 C120 22 305 30 416 118"/>
      <path d="M54 84 C160 8 320 26 430 60"/>
      <path d="M94 204 C188 160 280 162 396 224"/>
      <path d="M94 246 C198 330 318 326 348 246"/>
    </g>

    <g filter="url(#softGlow)">
      <circle cx="38" cy="130" r="8" fill="#31d8ff"/>
      <circle cx="54" cy="84" r="7" fill="#48dfff"/>
      <circle cx="94" cy="204" r="6" fill="#93eeff"/>
      <circle cx="94" cy="246" r="6" fill="#8ccaff"/>
      <circle cx="130" cy="184" r="7" fill="#bdefff"/>
      <circle cx="156" cy="132" r="8" fill="#aeefff"/>
      <circle cx="210" cy="178" r="5" fill="#f4f4ff"/>
      <circle cx="230" cy="42" r="8" fill="#dce6ff"/>
      <circle cx="230" cy="106" r="7" fill="#d9e7ff"/>
      <circle cx="230" cy="260" r="6" fill="#fff8d8"/>
      <circle cx="322" cy="190" r="7" fill="#e8c8ff"/>
      <circle cx="332" cy="190" r="6" fill="#d9b7ff"/>
      <circle cx="348" cy="246" r="6" fill="#c38cff"/>
      <circle cx="354" cy="98" r="8" fill="#d25cff"/>
      <circle cx="396" cy="224" r="6" fill="#be78ff"/>
      <circle cx="416" cy="118" r="6" fill="#cd78ff"/>
      <circle cx="430" cy="60" r="7" fill="#d66cff"/>
    </g>
  </g>

  <text x="610" y="232" fill="url(#wordmark)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="86" font-weight="300" letter-spacing="1.5">Ontoverse</text>
</svg>
