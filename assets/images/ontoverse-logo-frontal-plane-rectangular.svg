<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Ontoverse logo with rectangular frontal time plane</title>
  <desc id="desc">Dark neon Ontoverse logo with a history-space sphere, branching trajectories, a ruby frontal time plane, and a separated wordmark.</desc>
  <defs>
    <radialGradient id="bg" cx="42%" cy="48%" r="80%">
      <stop offset="0" stop-color="#07152a"/>
      <stop offset="0.56" stop-color="#020712"/>
      <stop offset="1" stop-color="#00030a"/>
    </radialGradient>
    <radialGradient id="sphereFade" cx="28%" cy="50%" r="64%">
      <stop offset="0" stop-color="#0b2a55" stop-opacity="0.36"/>
      <stop offset="0.55" stop-color="#06142b" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#020813" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="blueViolet" x1="70" y1="170" x2="650" y2="740" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10eaff"/>
      <stop offset="0.44" stop-color="#438cff"/>
      <stop offset="0.72" stop-color="#8b59ff"/>
      <stop offset="1" stop-color="#ff4fe1"/>
    </linearGradient>
    <linearGradient id="warm" x1="350" y1="260" x2="665" y2="660" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#ffd46a"/>
      <stop offset="1" stop-color="#ff2b64"/>
    </linearGradient>
    <linearGradient id="planeFill" x1="555" y1="140" x2="660" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff5570" stop-opacity="0.05"/>
      <stop offset="0.45" stop-color="#ff1f48" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ff5570" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="word" x1="875" y1="420" x2="1500" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#f5fbff"/>
      <stop offset="1" stop-color="#d3e3ff"/>
    </linearGradient>
    <filter id="cyanGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.04 0 0 0 0 0.55 0 0 0 0 1 0 0 0 0.9 0" result="color"/>
      <feMerge><feMergeNode in="color"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="rubyGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1 0 0 0 0 0.05 0 0 0 0 0.13 0 0 0 0.95 0" result="color"/>
      <feMerge><feMergeNode in="color"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="whiteGlow" x="-50%" y="-60%" width="200%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#ffffff" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g transform="translate(52 0)">
    <circle cx="338" cy="450" r="336" fill="url(#sphereFade)"/>
    <g fill="none" opacity="0.36" stroke-linecap="round">
      <circle cx="338" cy="450" r="320" stroke="#1b8dff" stroke-width="2"/>
      <ellipse cx="338" cy="450" rx="320" ry="170" stroke="#1d7cff" stroke-width="1"/>
      <ellipse cx="338" cy="450" rx="320" ry="90" stroke="#2a7aff" stroke-width="1"/>
      <ellipse cx="338" cy="450" rx="126" ry="320" stroke="#2a7aff" stroke-width="1"/>
      <ellipse cx="338" cy="450" rx="220" ry="320" stroke="#2a7aff" stroke-width="1"/>
      <path d="M18 450 H658" stroke="#2a7aff" stroke-width="1"/>
      <path d="M338 130 V770" stroke="#2a7aff" stroke-width="1"/>
      <path d="M80 245 C202 360 474 360 596 245" stroke="#245b9f" stroke-width="1"/>
      <path d="M80 655 C202 540 474 540 596 655" stroke="#245b9f" stroke-width="1"/>
    </g>

    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M42 450 C158 260 270 152 436 152 C530 152 608 235 665 335" stroke="#22e6ff" stroke-width="4.5" filter="url(#cyanGlow)"/>
      <path d="M42 450 C155 640 270 748 436 748 C531 748 608 665 665 565" stroke="#945cff" stroke-width="4.5" filter="url(#cyanGlow)"/>
      <path d="M42 450 C171 367 260 274 410 262 C525 253 590 308 650 385" stroke="#5ce9ff" stroke-width="4" filter="url(#cyanGlow)"/>
      <path d="M42 450 C172 530 260 626 410 638 C525 647 590 592 650 515" stroke="#bb5cff" stroke-width="4" filter="url(#cyanGlow)"/>
      <path d="M42 450 C212 450 360 450 642 450" stroke="#f8fbff" stroke-width="4" filter="url(#whiteGlow)"/>
      <path d="M258 450 C310 350 365 307 432 318 C520 334 562 390 638 401" stroke="#42b7ff" stroke-width="3.4" filter="url(#cyanGlow)"/>
      <path d="M258 450 C315 512 365 589 438 582 C520 574 566 522 638 500" stroke="#7f65ff" stroke-width="3.4" filter="url(#cyanGlow)"/>
      <path d="M360 330 C506 306 600 310 682 335" stroke="url(#warm)" stroke-width="3.4" filter="url(#cyanGlow)"/>
      <path d="M360 570 C506 594 600 590 682 565" stroke="url(#warm)" stroke-width="3.4" filter="url(#cyanGlow)"/>
    </g>

    <g fill="none" stroke-dasharray="3 12" stroke-linecap="round" opacity="0.92">
      <path d="M42 450 C100 190 315 66 565 144 C660 174 720 260 682 335" stroke="#177bff" stroke-width="3.2"/>
      <path d="M42 450 C100 710 315 834 565 756 C660 726 720 640 682 565" stroke="#7444ff" stroke-width="3.2"/>
      <path d="M258 450 C329 340 424 280 525 315 C600 341 604 380 638 401" stroke="#14e8ff" stroke-width="3"/>
      <path d="M258 450 C329 560 424 620 525 585 C600 559 604 520 638 500" stroke="#ee65ff" stroke-width="3"/>
      <path d="M405 370 C500 410 580 420 642 450" stroke="#e05cff" stroke-width="2.4"/>
      <path d="M405 530 C500 490 580 480 642 450" stroke="#e05cff" stroke-width="2.4"/>
    </g>

    <g filter="url(#rubyGlow)">
      <polygon points="604,215 690,160 690,740 604,685" fill="url(#planeFill)" stroke="#ff4562" stroke-width="4"/>
      <line x1="690" y1="160" x2="690" y2="740" stroke="#ff6b7d" stroke-width="5"/>
      <line x1="604" y1="215" x2="604" y2="685" stroke="#ff274d" stroke-width="2.2" opacity="0.72"/>
      <g opacity="0.36" stroke="#ff6d82" stroke-width="1.2" fill="none">
        <path d="M615 232 C675 278 675 347 615 392"/>
        <path d="M615 408 C675 450 675 520 615 565"/>
        <path d="M615 588 C675 625 675 680 615 686"/>
        <path d="M616 250 L682 190"/><path d="M616 330 L685 300"/><path d="M616 450 L684 450"/><path d="M616 570 L685 600"/><path d="M616 655 L684 720"/>
      </g>
    </g>

    <g stroke="#7ab8ff" stroke-width="3" filter="url(#cyanGlow)">
      <line x1="42" y1="450" x2="770" y2="450" opacity="0.92"/>
      <path d="M770 419 L820 450 L770 481 Z" fill="#f8fbff" stroke="#7ab8ff" stroke-width="3"/>
    </g>

    <g filter="url(#cyanGlow)">
      <circle cx="42" cy="450" r="18" fill="#071224" stroke="#f4fbff" stroke-width="6"/>
      <circle cx="258" cy="450" r="9" fill="#f7fbff" stroke="#8bd7ff" stroke-width="3"/>
      <circle cx="166" cy="332" r="6" fill="#dcfbff" stroke="#17ddff" stroke-width="4"/>
      <circle cx="166" cy="568" r="6" fill="#efe7ff" stroke="#9b63ff" stroke-width="4"/>
      <circle cx="234" cy="235" r="6" fill="#dbfbff" stroke="#1bdfff" stroke-width="4"/>
      <circle cx="234" cy="665" r="6" fill="#efe7ff" stroke="#9b63ff" stroke-width="4"/>
      <circle cx="360" cy="330" r="6" fill="#dbfbff" stroke="#1bdfff" stroke-width="4"/>
      <circle cx="360" cy="570" r="6" fill="#efe7ff" stroke="#9b63ff" stroke-width="4"/>
      <circle cx="430" cy="318" r="6" fill="#dbfbff" stroke="#1bdfff" stroke-width="4"/>
      <circle cx="438" cy="582" r="6" fill="#efe7ff" stroke="#8267ff" stroke-width="4"/>
      <circle cx="642" cy="450" r="7" fill="#f7fbff" stroke="#8bf4ff" stroke-width="4"/>
    </g>
    <g filter="url(#rubyGlow)">
      <circle cx="682" cy="335" r="11" fill="#fff4d8" stroke="#ffbd3c" stroke-width="6"/>
      <circle cx="682" cy="565" r="11" fill="#fff4d8" stroke="#ffbd3c" stroke-width="6"/>
    </g>
  </g>

  <g transform="translate(880 0)">
    <text x="0" y="482" fill="url(#word)" font-family="Orbitron, Eurostile, Rajdhani, Segoe UI, Arial, sans-serif" font-size="118" font-weight="400" letter-spacing="2" filter="url(#whiteGlow)">Ontoverse</text>
  </g>
</svg>
